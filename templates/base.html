<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page_title|default:"Almina Design Co." }}</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap");

      :root {
        --bg: #f6f7f8;
        --surface: #ffffff;
        --surface-muted: #f0f2f4;
        --ink: #121417;
        --muted: #596270;
        --accent: #0f1720;
        --accent-2: #2f3c4d;
        --line: #d7dde3;
        --success: #0f7a3d;
        --danger: #9f1d1d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        color: var(--ink);
        background: radial-gradient(
          circle at 10% 0%,
          #ffffff 0%,
          #edf1f4 45%,
          #e7ecef 100%
        );
        min-height: 100vh;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(18, 20, 23, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(18, 20, 23, 0.025) 1px, transparent 1px);
        background-size: 28px 28px;
        mask-image: radial-gradient(
          circle at 40% 20%,
          #000 35%,
          transparent 100%
        );
      }

      .container {
        width: min(1160px, 92vw);
        margin: 0 auto;
        position: relative;
        z-index: 1;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 20;
        border-bottom: 1px solid rgba(18, 20, 23, 0.08);
        backdrop-filter: blur(14px);
        background: rgba(246, 247, 248, 0.88);
      }

      .topbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 1rem 0;
      }

      .brand {
        font-size: 1.1rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        font-weight: 700;
        text-decoration: none;
        color: var(--ink);
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
      }

      nav a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
        font-size: 0.92rem;
        border: 1px solid transparent;
        border-radius: 999px;
        padding: 0.45rem 0.85rem;
        transition: all 0.2s ease;
      }

      nav a:hover {
        border-color: var(--line);
        background: var(--surface);
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 1.15rem;
        box-shadow: 0 10px 30px rgba(23, 27, 31, 0.04);
      }

      .page {
        padding: 1.4rem 0 2.8rem;
      }

      h1,
      h2,
      h3 {
        letter-spacing: -0.02em;
      }

      h1 {
        font-size: clamp(1.75rem, 2.5vw, 2.45rem);
        margin: 0 0 0.75rem;
      }

      p {
        color: var(--muted);
      }

      a {
        color: var(--accent);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: var(--surface);
      }

      th,
      td {
        border-bottom: 1px solid #e5eaef;
        padding: 0.75rem;
        text-align: left;
        font-size: 0.95rem;
      }

      th {
        background: var(--surface-muted);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 1.1rem;
      }

      .item-card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 0.85rem;
        overflow: hidden;
        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease;
      }

      .item-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 18px 38px rgba(17, 24, 33, 0.11);
      }

      .item-card h3 {
        margin: 0.45rem 0 0.35rem;
        font-size: 1.02rem;
      }

      .item-card h3 a {
        color: inherit;
        text-decoration: none;
      }

      .price {
        color: var(--ink);
        font-weight: 700;
        font-size: 1.05rem;
      }

      .tag {
        display: inline-block;
        padding: 0.3rem 0.7rem;
        border-radius: 999px;
        background: #eef2f7;
        color: #344052;
        font-size: 0.78rem;
        margin-bottom: 0.7rem;
        border: 1px solid #d8dee7;
      }

      .warning {
        color: var(--danger);
        font-weight: 700;
      }

      form.auth-form {
        max-width: 420px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 1.25rem;
        box-shadow: 0 18px 36px rgba(22, 27, 33, 0.08);
      }

      input,
      button {
        width: 100%;
        padding: 0.68rem 0.75rem;
        margin-top: 0.5rem;
        border-radius: 10px;
        border: 1px solid #c5ced9;
        font-size: 0.98rem;
        font-family: inherit;
      }

      textarea,
      select {
        width: 100%;
        padding: 0.68rem 0.75rem;
        margin-top: 0.5rem;
        border-radius: 10px;
        border: 1px solid #c5ced9;
        font-size: 0.98rem;
        font-family: inherit;
      }

      input:focus,
      textarea:focus,
      select:focus {
        outline: 2px solid #171f2b;
        outline-offset: 2px;
      }

      button {
        background: linear-gradient(120deg, #121a23, #273443);
        color: #f7f8fa;
        border: none;
        font-weight: 700;
        cursor: pointer;
        transition: filter 0.2s ease;
      }

      button:hover {
        filter: brightness(1.08);
      }

      .filter-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 1.3rem;
      }

      .filter-bar a.tag {
        font-size: 0.84rem;
        font-weight: 600;
        padding: 0.45rem 0.95rem;
        text-decoration: none;
        cursor: pointer;
        margin-bottom: 0;
      }

      .tag-active {
        background: #121a23;
        border-color: #121a23;
        color: #f3f6fa;
      }

      .item-img {
        width: 100%;
        height: 220px;
        object-fit: cover;
        border-radius: 12px;
        margin-bottom: 0.85rem;
        display: block;
        background: #e0e6ee;
      }

      .item-img-placeholder {
        height: 220px;
        background: linear-gradient(135deg, #d9e0e8, #eef2f6);
        border-radius: 12px;
        margin-bottom: 0.85rem;
        width: 100%;
      }

      .btn-outline {
        display: inline-block;
        padding: 0.5rem 0.95rem;
        border: 1px solid #cad3de;
        color: var(--accent);
        border-radius: 10px;
        font-weight: 600;
        text-decoration: none;
        font-size: 0.9rem;
        transition: all 0.2s ease;
      }

      .btn-outline:hover {
        background: var(--surface-muted);
        border-color: #b8c4d3;
      }

      .card-actions {
        display: flex;
        gap: 0.6rem;
        align-items: center;
        margin-top: 0.85rem;
      }

      .card-actions button {
        width: auto;
        padding: 0.5rem 0.95rem;
        font-size: 0.9rem;
        margin-top: 0;
      }

      .cart-badge {
        display: inline-block;
        background: var(--accent-2);
        color: #fff;
        border-radius: 999px;
        padding: 0 0.46rem;
        font-size: 0.75rem;
        font-weight: 700;
        margin-left: 0.28rem;
        vertical-align: middle;
      }

      .hero {
        background: linear-gradient(120deg, #111821, #2a3646);
        color: #eef2f8;
        border-radius: 24px;
        padding: clamp(1.4rem, 4vw, 2.4rem);
        margin-bottom: 1.1rem;
        position: relative;
        overflow: hidden;
      }

      .hero::after {
        content: "";
        position: absolute;
        right: -80px;
        top: -50px;
        width: 230px;
        height: 230px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.2),
          transparent 70%
        );
      }

      .hero p {
        margin: 0;
        max-width: 58ch;
        color: #ccd5e2;
      }

      .hero h1 {
        margin-bottom: 0.45rem;
      }

      .detail-layout {
        display: grid;
        gap: 1rem;
        grid-template-columns: 1.05fr 1fr;
      }

      .split-layout {
        display: grid;
        grid-template-columns: 1fr 0.9fr;
        gap: 1.2rem;
        align-items: start;
      }

      .btn-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.66rem 1.05rem;
        border-radius: 10px;
        font-weight: 700;
        text-decoration: none;
        color: #f6f8fb;
        background: linear-gradient(120deg, #121a23, #273443);
      }

      .btn-link:hover {
        filter: brightness(1.08);
      }

      .btn-remove {
        width: auto;
        padding: 0.35rem 0.75rem;
        font-size: 0.85rem;
        background: linear-gradient(120deg, #7a1f1f, #9f2f2f);
      }

      .muted {
        color: var(--muted);
      }

      .stack {
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .hero,
      .panel,
      .item-card {
        animation: rise 0.45s ease both;
      }

      @media (max-width: 640px) {
        .brand {
          font-size: 0.95rem;
          letter-spacing: 0.12em;
        }

        nav a {
          font-size: 0.84rem;
          padding: 0.4rem 0.76rem;
        }
      }

      @media (max-width: 900px) {
        .detail-layout,
        .split-layout {
          grid-template-columns: 1fr;
        }

        .item-img,
        .item-img-placeholder {
          height: 200px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="container topbar">
        <a href="/" class="brand">Almina Design Co.</a>
        <nav>
          <a href="/">Storefront</a>
          <a href="/cart/"
            >Cart{% if cart_count %}<span class="cart-badge"
              >{{ cart_count }}</span
            >{% endif %}</a
          >
          <a href="/inventory/">Inventory</a>
          <a href="/admin/">Admin</a>
          {% if user.is_authenticated %}
          <a href="/accounts/logout/">Logout</a>
          {% else %}
          <a href="/accounts/login/">Login</a>
          {% endif %}
        </nav>
      </div>
    </header>
    <main class="container page">{% block content %}{% endblock %}</main>
  </body>
</html>
