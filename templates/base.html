<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page_title|default:"Regiment Relics" }}</title>
    <style>
      :root {
        --bg: #f5f1e8;
        --paper: #fffaf2;
        --ink: #1f2933;
        --muted: #5f6c7b;
        --accent: #3f5d45;
        --accent-2: #8d6e3e;
        --border: #d4c7b2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at top, #fcf8ef 0%, var(--bg) 65%);
      }

      .container {
        width: min(1050px, 92vw);
        margin: 0 auto;
        padding: 1.25rem 0 2rem;
      }

      header {
        border-bottom: 1px solid var(--border);
        background: linear-gradient(
          90deg,
          rgba(63, 93, 69, 0.9),
          rgba(37, 58, 43, 0.9)
        );
        color: #f6f2e9;
      }

      .topbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 1rem 0;
      }

      .brand {
        font-size: 1.5rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 700;
      }

      nav a {
        color: #f6f2e9;
        text-decoration: none;
        margin-left: 1rem;
        font-weight: 600;
      }

      nav a:hover {
        text-decoration: underline;
      }

      .panel {
        background: var(--paper);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 1rem;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
      }

      th,
      td {
        border-bottom: 1px solid #ece2d3;
        padding: 0.7rem;
        text-align: left;
        font-size: 0.95rem;
      }

      th {
        background: #efe5d6;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 1rem;
      }

      .item-card {
        background: var(--paper);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 1rem;
      }

      .price {
        color: var(--accent);
        font-weight: 700;
      }

      .tag {
        display: inline-block;
        padding: 0.25rem 0.55rem;
        border-radius: 999px;
        background: #e9dfcf;
        color: #4a3f30;
        font-size: 0.8rem;
        margin-bottom: 0.6rem;
      }

      .warning {
        color: #8b2f1f;
        font-weight: 700;
      }

      form.auth-form {
        max-width: 420px;
        background: var(--paper);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 1rem;
      }

      input,
      button {
        width: 100%;
        padding: 0.6rem;
        margin-top: 0.5rem;
        border-radius: 6px;
        border: 1px solid #c9b89e;
        font-size: 1rem;
      }

      textarea,
      select {
        width: 100%;
        padding: 0.6rem;
        margin-top: 0.5rem;
        border-radius: 6px;
        border: 1px solid #c9b89e;
        font-size: 1rem;
        font-family: inherit;
      }

      button {
        background: var(--accent);
        color: #fff;
        border: none;
        font-weight: 700;
        cursor: pointer;
      }

      .filter-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 1.25rem;
      }

      .filter-bar a.tag {
        font-size: 0.9rem;
        padding: 0.35rem 0.8rem;
        text-decoration: none;
        cursor: pointer;
      }

      .tag-active {
        background: var(--accent);
        color: #f6f2e9;
      }

      .item-img {
        width: calc(100% + 2rem);
        height: 170px;
        object-fit: cover;
        border-radius: 8px 8px 0 0;
        margin: -1rem -1rem 0.75rem -1rem;
        display: block;
      }

      .item-img-placeholder {
        height: 140px;
        background: #e9dfcf;
        border-radius: 8px 8px 0 0;
        margin: -1rem -1rem 0.75rem -1rem;
        width: calc(100% + 2rem);
      }

      .btn-outline {
        display: inline-block;
        padding: 0.45rem 0.9rem;
        border: 2px solid var(--accent);
        color: var(--accent);
        border-radius: 6px;
        font-weight: 600;
        text-decoration: none;
        font-size: 0.9rem;
      }

      .btn-outline:hover {
        background: var(--accent);
        color: #fff;
      }

      .card-actions {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        margin-top: 0.75rem;
      }

      .card-actions button {
        width: auto;
        padding: 0.45rem 0.85rem;
        font-size: 0.9rem;
        margin-top: 0;
      }

      .cart-badge {
        display: inline-block;
        background: var(--accent-2);
        color: #fff;
        border-radius: 999px;
        padding: 0 0.45rem;
        font-size: 0.75rem;
        font-weight: 700;
        margin-left: 0.2rem;
        vertical-align: middle;
      }

      @media (max-width: 640px) {
        .brand {
          font-size: 1.2rem;
        }

        nav a {
          margin-left: 0.7rem;
          font-size: 0.9rem;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="container topbar">
        <div class="brand">Regiment Relics</div>
        <nav>
          <a href="/">Storefront</a>
          <a href="/cart/"
            >Cart{% if cart_count %}<span class="cart-badge"
              >{{ cart_count }}</span
            >{% endif %}</a
          >
          <a href="/inventory/">Inventory</a>
          <a href="/admin/">Admin</a>
          {% if user.is_authenticated %}
          <a href="/accounts/logout/">Logout</a>
          {% else %}
          <a href="/accounts/login/">Login</a>
          {% endif %}
        </nav>
      </div>
    </header>
    <main class="container">{% block content %}{% endblock %}</main>
  </body>
</html>
