services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: almina_design_web
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    restart: unless-stopped
